name: Actualizar catalogo NdH

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar catalog.json
        env:
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
        run: python3 build_catalog_api.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "NdH Bot"
          git config user.email "ndh-bot@naranjasdehiroshima.com"
          git add catalog.json
          git diff --staged --quiet || git commit -m "Actualizar catalogo - $(date -u '+%Y-%m-%d')"
          git push
